    inputText:"#1a1a2e",valueBg:"rgba(99,102,241,0.08)",valueText:"#6366f1",
    tableBg:"rgba(99,102,241,0.03)",tableHead:"rgba(99,102,241,0.08)",
    previewBg:"rgba(99,102,241,0.05)",barBg:"rgba(99,102,241,0.06)",
    greenBg:"rgba(34,197,94,0.05)",greenBorder:"rgba(34,197,94,0.15)",

    sliderTrack:"rgba(99,102,241,0.12)",rowBorder:"rgba(0,0,0,0.04)",
    ctaBg:"linear-gradient(135deg,rgba(99,102,241,0.08),rgba(139,92,246,0.08))",
    footerBorder:"rgba(99,102,241,0.06)",barAlpha:"33",
  },
  dark: {
    bg:"#0f0a1f",bgGrad:"linear-gradient(180deg,#0a0618 0%,#0f0a1f 30%)",
    card:"rgba(99,102,241,0.04)",cardBorder:"rgba(99,102,241,0.15)",
    text:"#e2e0f0",textSoft:"rgba(226,224,240,0.7)",textMuted:"rgba(226,224,240,0.4)",
    headerBg:"rgba(15,10,31,0.85)",headerBorder:"rgba(139,92,246,0.15)",
    inputBg:"rgba(0,0,0,0.3)",inputBorder:"rgba(99,102,241,0.2)",
    inputText:"#e2e0f0",valueBg:"rgba(99,102,241,0.1)",valueText:"#c4b5fd",
    tableBg:"rgba(99,102,241,0.03)",tableHead:"rgba(99,102,241,0.1)",
    previewBg:"rgba(0,0,0,0.25)",barBg:"rgba(0,0,0,0.2)",
    greenBg:"rgba(34,197,94,0.05)",greenBorder:"rgba(34,197,94,0.15)",

    footerBorder:"rgba(99,102,241,0.08)",barAlpha:"55",

};

const CALENDLY="https://calendly.com/regi-k-xbo/30min";

const P = {
  xbo:{name:"XBO.emoney",fx:0.003,txLocal:0,txIntl:0,mo:0,card:0,cryptoFx:0,recvFee:0,weekendFx:0,color:"#8b5cf6",icon:"\u{1F7E3}",hasCrypto:true,note:"Crypto + fiat unified. SEPA/SWIFT. No hidden fees."},
  revolut:{name:"Revolut Business",fx:0.006,txLocal:0,txIntl:5,mo:35,card:0,cryptoFx:0.025,recvFee:0,weekendFx:0.01,color:"#0075EB",icon:"\u{1F535}",hasCrypto:false,note:"Grow plan. 0.6% FX beyond \u20AC17.5K/mo. 1% weekend surcharge."},
  wise:{name:"Wise Business",fx:0.004,txLocal:0,txIntl:1.5,mo:0,card:3,cryptoFx:0,recvFee:0,weekendFx:0,color:"#9FE870",icon:"\u{1F7E2}",hasCrypto:false,note:"No monthly fee. ~0.4% avg FX conversion. \u20AC50 one-time setup."},
  airwallex:{name:"Airwallex",fx:0.006,txLocal:0,txIntl:0,mo:22,card:0,cryptoFx:0,recvFee:0.003,weekendFx:0,color:"#FF6B35",icon:"\u{1F7E0}",hasCrypto:false,note:"Explore plan. 0.5% major / 1% minor FX. 0.3% receiving fee."},
  bank:{name:"Traditional Bank",fx:0.03,txLocal:0.5,txIntl:20,mo:40,card:8,cryptoFx:0,recvFee:0,weekendFx:0,color:"#64748b",icon:"\u{1F3E6}",hasCrypto:false,note:"UK high-street composite (NatWest/Santander/HSBC)."},
};

function cd(p,intlTx,localTx,avg,cur,cards,cryptoVol){
  const fm=Math.min(cur/3,1.5);
  const fxC=Math.round(intlTx*avg*p.fx*fm);const itC=Math.round(intlTx*p.txIntl);const ltC=Math.round(localTx*p.txLocal);
  const mo=p.mo;const cC=cards*p.card;
  const crC=cryptoVol>0&&!p.hasCrypto?Math.round(cryptoVol*0.02):cryptoVol>0&&p.hasCrypto?Math.round(cryptoVol*p.cryptoFx):0;
  const rC=Math.round(intlTx*avg*p.recvFee*0.5);const wC=Math.round(intlTx*avg*p.weekendFx*0.15);
  return{fxCost:fxC,intlTxCost:itC,localTxCost:ltC,mo,cardCost:cC,cryptoCost:crC,recvCost:rC,weekendCost:wC,total:fxC+itC+ltC+mo+cC+crC+rC+wC};
}

function Sld({label,value,setValue,min,max,step:s,prefix,icon,sub,t}){
  const[ed,setEd]=useState(false);const[dr,setDr]=useState("");const ref=useRef(null);
  const disp=prefix?`${prefix}${value.toLocaleString()}`:String(value);
  const startE=()=>{setDr(String(value));setEd(true);setTimeout(()=>ref.current?.select(),10)};
  const commit=()=>{const n=parseInt(dr.replace(/[^0-9]/g,""),10);if(!isNaN(n))setValue(Math.max(min,Math.min(max,n)));setEd(false)};
  const onK=(e)=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false)};
  return(
    <div style={{marginBottom:22}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div><span style={{fontSize:13,fontWeight:600,color:t.text,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>{icon}</span>{label}</span>
        {sub&&<div style={{fontSize:10,color:t.textMuted,marginLeft:24,marginTop:2}}>{sub}</div>}</div>
        {ed?(<input ref={ref} type="text" inputMode="numeric" value={dr} onChange={e=>setDr(e.target.value)} onBlur={commit} onKeyDown={onK} style={{width:110,textAlign:"right",fontSize:16,fontWeight:800,color:"#fff",background:"rgba(99,102,241,0.2)",border:"2px solid #8b5cf6",borderRadius:8,padding:"4px 10px",outline:"none",fontFamily:"inherit"}}/>
        ):(<div onClick={startE} style={{minWidth:90,textAlign:"right",fontSize:16,fontWeight:800,color:t.valueText,background:t.valueBg,border:`1px solid ${t.cardBorder}`,borderRadius:8,padding:"5px 12px",cursor:"text",userSelect:"none"}}>{disp}</div>)}
      </div>
      <input type="range" min={min} max={max} step={s||1} value={value} onChange={e=>setValue(Number(e.target.value))} style={{background:t.sliderTrack}}/>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:t.textMuted,opacity:0.5,marginTop:3}}>
        <span>{prefix?`${prefix}${min.toLocaleString()}`:min}</span><span>{prefix?`${prefix}${max.toLocaleString()}`:max}</span>
      </div>
    </div>
  );
}

          </div>
        </div>
      </div>

      <div style={{maxWidth:800,margin:"0 auto",padding:"0 28px 60px"}}>

        {/* STEP 0: INPUTS */}
        {step===0&&(
          <div>
            <div style={{textAlign:"center",padding:"44px 0 16px"}}>
              <div style={{display:"inline-block",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:20,padding:"4px 16px",fontSize:11,fontWeight:700,color:"#22c55e",marginBottom:16,letterSpacing:0.5}}>FREE TOOL / NO SIGN-UP NEEDED</div>
              <h1 style={{fontSize:32,fontWeight:900,lineHeight:1.15,letterSpacing:-0.5,margin:"0 0 12px",color:t.text}}>How much are you<br/><span style={{background:"linear-gradient(90deg,#6366f1,#ec4899)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>overpaying</span> for business banking?</h1>
              <p style={{fontSize:14,color:t.textSoft,maxWidth:460,margin:"0 auto 28px"}}>Enter your numbers. Get instant results. No email required.</p>
            </div>

            {/* About */}
            <div style={{background:mode==="light"?"linear-gradient(135deg,rgba(99,102,241,0.06),rgba(139,92,246,0.06))":t.purpleBg,border:`1px solid ${t.purpleBorder}`,borderRadius:16,padding:"22px 26px",marginBottom:28}}>

              <Sld t={t} icon={"\u{1F30E}"} label="Currencies you regularly use" value={cur} setValue={setCur} min={1} max={20}/>
              <Sld t={t} icon={"\u{1F4B3}"} label="Team cards needed" value={crd} setValue={setCrd} min={0} max={30}/>

              {/* Crypto */}

              {all.map(r=>{const w=Math.max((r.total/mx)*100,6);const isX=r.key==="xbo";const isC=r.key===cheap.key;
                return(
                  <div key={r.key} style={{background:isX?t.purpleBg:t.card,border:`1px solid ${isX?t.purpleBorder:t.cardBorder}`,borderRadius:14,padding:"14px 18px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:16}}>{r.icon}</span>
                        <div>
                          <span style={{fontSize:13,fontWeight:isX?800:600,color:isX?"#8b5cf6":t.text}}>{r.name}</span>
                          {isC&&<span style={{marginLeft:8,fontSize:9,fontWeight:700,background:"rgba(34,197,94,0.15)",color:"#22c55e",padding:"2px 8px",borderRadius:6}}>LOWEST COST</span>}
                          {isX&&hasCrypto&&<span style={{marginLeft:6,fontSize:9,fontWeight:700,background:"rgba(139,92,246,0.15)",color:"#8b5cf6",padding:"2px 8px",borderRadius:6}}>CRYPTO+FIAT</span>}
                          {!r.hasCrypto&&hasCrypto&&!isX&&<span style={{marginLeft:6,fontSize:9,fontWeight:600,color:t.textMuted}}>no crypto</span>}
                        </div>
                      </div>
                      <span style={{fontSize:18,fontWeight:900,color:isC?"#22c55e":t.text}}>{"\u20AC"}{r.total.toLocaleString()}<span style={{fontSize:11,color:t.textMuted,fontWeight:500}}>/mo</span></span>
                    </div>
                    <div style={{width:"100%",height:7,background:t.barBg,borderRadius:4}}>
                      <div style={{width:`${w}%`,height:"100%",background:isX?"linear-gradient(90deg,#6366f1,#22c55e)":`${r.color}66`,borderRadius:4,transition:"width 0.6s"}}/>
                    </div>
                    <div style={{fontSize:10,color:t.textMuted,marginTop:5}}>{r.note}</div>
                  </div>
                );
              })}
            </div>

            {/* Full breakdown */}
            <h3 style={{fontSize:17,fontWeight:800,margin:"0 0 12px",color:t.text}}>Full cost breakdown</h3>
            <div style={{borderRadius:14,overflow:"hidden",border:`1px solid ${t.cardBorder}`,marginBottom:28}}>
              <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:600}}>
                <thead><tr style={{background:t.tableHead}}>
                  {["Provider","FX","Intl Tx","Local Tx","Monthly","Cards",hasCrypto?"Crypto":null,"Hidden","Total/mo"].filter(Boolean).map((h,i)=>(
                    <th key={i} style={{padding:"10px 8px",textAlign:i===0?"left":"right",fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:0.3,color:t.textMuted,whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {all.map(r=>{const isX=r.key==="xbo";const isC=r.key===cheap.key;const hid=r.recvCost+r.weekendCost;
                    return(
                      <tr key={r.key} style={{borderBottom:`1px solid ${t.rowBorder}`,background:isX?t.purpleBg:"transparent"}}>
                        <td style={{padding:"10px 8px",fontWeight:isX?800:600,color:isX?"#8b5cf6":t.text,whiteSpace:"nowrap"}}>{r.icon} {r.name}</td>
                        <td style={{padding:"10px 8px",textAlign:"right",color:t.textSoft}}>{"\u20AC"}{r.fxCost.toLocaleString()}</td>
                        <td style={{padding:"10px 8px",textAlign:"right",color:t.textSoft}}>{"\u20AC"}{r.intlTxCost.toLocaleString()}</td>
                        <td style={{padding:"10px 8px",textAlign:"right",color:t.textSoft}}>{"\u20AC"}{r.localTxCost.toLocaleString()}</td>
                        <td style={{padding:"10px 8px",textAlign:"right",color:t.textSoft}}>{"\u20AC"}{r.mo}</td>
                        <td style={{padding:"10px 8px",textAlign:"right",color:t.textSoft}}>{"\u20AC"}{r.cardCost}</td>
                        {hasCrypto&&<td style={{padding:"10px 8px",textAlign:"right",color:r.hasCrypto?"#22c55e":r.cryptoCost>0?"#ef4444":t.textMuted,fontWeight:r.hasCrypto?700:400}}>{r.hasCrypto?"\u20AC0":r.cryptoCost>0?`\u20AC${r.cryptoCost.toLocaleString()}`:"-"}</td>}
                        <td style={{padding:"10px 8px",textAlign:"right",color:hid>0?"#f59e0b":t.textMuted}}>{hid>0?`\u20AC${hid.toLocaleString()}`:"-"}</td>
                        <td style={{padding:"10px 8px",textAlign:"right",fontWeight:900,fontSize:13,color:isC?"#22c55e":t.text}}>{"\u20AC"}{r.total.toLocaleString()}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              </div>
            </div>

            {/* Hidden fees */}
            <div style={{background:t.yellowBg,border:`1px solid ${t.yellowBorder}`,borderRadius:14,padding:"16px 20px",marginBottom:24}}>
              <h4 style={{fontSize:12,fontWeight:700,color:"#f59e0b",margin:"0 0 8px",textTransform:"uppercase",letterSpacing:0.5}}>About hidden fees</h4>
              <div style={{fontSize:11,color:t.textSoft,lineHeight:1.7}}>
                <strong>Revolut weekend FX:</strong> 1% surcharge outside market hours (~15% of transactions).<br/>
                <strong>Airwallex receiving fee:</strong> 0.3% on third-party inbound payments (~50% of inbound).<br/>
                <strong>Banks:</strong> intermediary fees ({"\u20AC"}8-25/SWIFT) not included. Actual costs likely higher.<br/>
                <strong>XBO.emoney:</strong> no hidden fees. No weekend surcharges. Competitive FX rates.
              </div>
            </div>

            {/* Fee assumptions */}
            <div style={{background:t.tableBg,border:`1px solid ${t.cardBorder}`,borderRadius:14,padding:"16px 20px",marginBottom:24}}>
              <h4 style={{fontSize:11,fontWeight:700,color:t.textMuted,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:0.5}}>Fee assumptions</h4>
              <div style={{borderRadius:8,overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                  <thead><tr style={{background:t.tableHead}}>
                    {["Provider","FX","Intl Transfer","Monthly","Card","Plan"].map((h,i)=>(<th key={i} style={{padding:"7px 8px",textAlign:i===0||i===5?"left":"right",fontWeight:700,color:t.textMuted}}>{h}</th>))}
                  </tr></thead>
                  <tbody>
                    {Object.entries(P).map(([k,p])=>(<tr key={k} style={{borderBottom:`1px solid ${t.rowBorder}`}}>
                      <td style={{padding:"6px 8px",fontWeight:k==="xbo"?700:400,color:k==="xbo"?"#8b5cf6":t.text}}>{p.icon} {p.name}</td>
                      <td style={{padding:"6px 8px",textAlign:"right",color:t.textSoft}}>{(p.fx*100).toFixed(1)}%</td>
                      <td style={{padding:"6px 8px",textAlign:"right",color:t.textSoft}}>{p.txIntl===0?"Free":`\u20AC${p.txIntl}`}</td>
                      <td style={{padding:"6px 8px",textAlign:"right",color:t.textSoft}}>{p.mo===0?"Free":`\u20AC${p.mo}`}</td>
                      <td style={{padding:"6px 8px",textAlign:"right",color:t.textSoft}}>{p.card===0?"Free":`\u20AC${p.card}`}</td>
                      <td style={{padding:"6px 8px",color:t.textMuted,fontSize:9}}>{k==="revolut"?"Grow":k==="airwallex"?"Explore":k==="wise"?"Standard":k==="bank"?"UK avg":"Standard"}</td>
                    </tr>))}
                  </tbody>
                </table>
              </div>
              <p style={{fontSize:9,color:t.textMuted,marginTop:6,lineHeight:1.5}}>Based on publicly available pricing, early 2026. Revolut Grow: {"\u00A3"}30/mo, 0.6% FX beyond allowance. Wise: ~0.4% avg FX. Airwallex Explore: 0.5-1% FX, 0.3% recv fee. Banks: NatWest/Santander/HSBC composite.</p>
            </div>

            {/* Inputs summary */}
            <div style={{background:t.tableBg,border:`1px solid ${t.cardBorder}`,borderRadius:14,padding:"16px 20px",marginBottom:28}}>
              <h4 style={{fontSize:11,fontWeight:700,color:t.textMuted,margin:"0 0 10px",textTransform:"uppercase",letterSpacing:0.5}}>Calculated based on</h4>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                {[{l:"Intl payments/mo",v:intlTx},{l:"Local payments/mo",v:localTx},{l:"Avg payment size",v:`\u20AC${avg.toLocaleString()}`},{l:"Currencies",v:cur},{l:"Team cards",v:crd},{l:"Crypto-to-fiat/mo",v:cryptoVol>0?`\u20AC${cryptoVol.toLocaleString()}`:"None"}].map((item,i)=>(
                  <div key={i}><div style={{fontSize:10,color:t.textMuted}}>{item.l}</div><div style={{fontSize:13,fontWeight:700,color:t.text}}>{item.v}</div></div>
                ))}
              </div>
            </div>

            {/* Share */}
            <div style={{display:"flex",gap:10,marginBottom:28}}>
              <a href={`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`} target="_blank" rel="noopener noreferrer" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"12px",background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:12,fontSize:12,fontWeight:600,color:t.text,textDecoration:"none",cursor:"pointer"}}>Share on X</a>
              <a href={`https://www.linkedin.com/sharing/share-offsite/?url=https://xbo-emoney-calculator.vercel.app`} target="_blank" rel="noopener noreferrer" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"12px",background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:12,fontSize:12,fontWeight:600,color:t.text,textDecoration:"none",cursor:"pointer"}}>Share on LinkedIn</a>
              <button onClick={()=>{navigator.clipboard.writeText("https://xbo-emoney-calculator.vercel.app")}} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"12px",background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:12,fontSize:12,fontWeight:600,color:t.text,cursor:"pointer"}}>Copy Link</button>
            </div>

            {/* CTA: Book a Call */}
            <div style={{background:t.ctaBg,border:`1px solid ${t.purpleBorder}`,borderRadius:20,padding:"32px 26px",textAlign:"center"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:14}}>
                <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"#fff"}}>X</div>
                <div style={{fontSize:20,fontWeight:900,color:t.text}}>XBO<span style={{color:"#8b5cf6"}}>.emoney</span></div>
              </div>
              <h3 style={{fontSize:22,fontWeight:800,margin:"0 0 8px",color:t.text}}>Ready to save {"\u20AC"}{annSave.toLocaleString()}/year?</h3>
              <p style={{fontSize:13,color:t.textSoft,margin:"0 0 4px"}}>Talk to our team. 30-minute call. No commitment.</p>
              <p style={{fontSize:12,color:t.textMuted,margin:"0 0 24px"}}>We'll walk you through the platform, answer your questions, and help you get set up.</p>
              {hasCrypto&&<p style={{fontSize:12,color:"#8b5cf6",margin:"0 0 20px",fontWeight:600}}>The only platform where your crypto and fiat live together.</p>}
              <a href={CALENDLY} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",padding:"16px 48px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",borderRadius:14,fontSize:17,fontWeight:700,textDecoration:"none",boxShadow:"0 4px 20px rgba(99,102,241,0.3)",marginBottom:8}}>Book a Free Call</a>
              <p style={{fontSize:12,color:t.textMuted,marginTop:10}}>or explore the platform directly</p>
              <a href="https://xbo.com/en/emoney" target="_blank" rel="noopener noreferrer" style={{fontSize:14,fontWeight:700,color:"#8b5cf6",textDecoration:"none"}}>xbo.com/emoney</a>
            </div>

            <p style={{fontSize:9,color:t.textMuted,textAlign:"center",lineHeight:1.6,marginTop:20}}>Estimates based on publicly available fee structures (early 2026). Actual costs vary by plan, volume, and provider. XBO.emoney fees reflect standard tier. For illustrative purposes only, not financial advice.</p>
          </div>
        )}
      </div>

      <div style={{borderTop:`1px solid ${t.footerBorder}`,padding:"18px 28px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,color:t.textMuted,fontSize:11}}>
          <div style={{width:16,height:16,borderRadius:4,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:900,color:"#fff"}}>X</div>
          <span>Powered by XBO.com</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
