<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XBO.emoney Fee Savings Calculator</title>
<meta name="description" content="See how much you could save on business banking with XBO.emoney. Compare fees against Revolut, Wise, Airwallex, and traditional banks.">
<meta property="og:title" content="XBO.emoney Fee Savings Calculator">
<meta property="og:description" content="How much are you overpaying for business banking? Compare XBO.emoney vs Revolut, Wise, Airwallex, and traditional banks.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#0f0a1f;color:#e2e0f0;min-height:100vh;-webkit-font-smoothing:antialiased}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(99,102,241,0.15);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);cursor:pointer;box-shadow:0 2px 8px rgba(99,102,241,0.4)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);cursor:pointer;border:none;box-shadow:0 2px 8px rgba(99,102,241,0.4)}
::selection{background:rgba(99,102,241,0.3)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef} = React;

const P = {
  bank:{name:"Traditional Bank",fx:0.025,tx:30,mo:35,card:10,color:"#64748b",icon:"\u{1F3E6}"},
  revolut:{name:"Revolut Business",fx:0.006,tx:3,mo:25,card:0,color:"#0075EB",icon:"\u{1F535}"},
  wise:{name:"Wise Business",fx:0.0065,tx:1.5,mo:0,card:3,color:"#9FE870",icon:"\u{1F7E2}"},
  airwallex:{name:"Airwallex",fx:0.007,tx:0,mo:0,card:0,color:"#FF6B35",icon:"\u{1F7E0}"},
  xbo:{name:"XBO.emoney",fx:0.003,tx:0,mo:0,card:0,color:"#8b5cf6",icon:"\u{1F7E3}"},
};

function cd(p,t,a,c,cr,hasCr){
  const fxC=Math.round(t*a*p.fx*Math.min(c/3,1.5));
  const txC=Math.round(t*p.tx);
  const mF=p.mo;
  const cC=cr*p.card;
  const crC=hasCr&&p.name!=="XBO.emoney"?Math.round(t*a*0.015*0.3):0;
  return{fxCost:fxC,txCost:txC,monthlyFee:mF,cardCost:cC,cryptoCost:crC,total:fxC+txC+mF+cC+crC};
}

function Sld({label,value,setValue,min,max,step:s,prefix,icon}){
  const[ed,setEd]=useState(false);
  const[dr,setDr]=useState("");
  const ref=useRef(null);
  const disp=prefix?`${prefix}${value.toLocaleString()}`:String(value);
  const startE=()=>{setDr(String(value));setEd(true);setTimeout(()=>ref.current?.select(),10)};
  const commit=()=>{const n=parseInt(dr.replace(/[^0-9]/g,""),10);if(!isNaN(n))setValue(Math.max(min,Math.min(max,n)));setEd(false)};
  const onK=(e)=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false)};
  return(
    <div style={{marginBottom:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>{icon}</span>{label}
        </span>
        {ed?(
          <input ref={ref} type="text" inputMode="numeric" value={dr} onChange={e=>setDr(e.target.value)} onBlur={commit} onKeyDown={onK}
            style={{width:110,textAlign:"right",fontSize:16,fontWeight:800,color:"#fff",background:"rgba(99,102,241,0.2)",border:"2px solid #8b5cf6",borderRadius:8,padding:"4px 10px",outline:"none",fontFamily:"inherit"}}/>
        ):(
          <div onClick={startE} style={{minWidth:90,textAlign:"right",fontSize:16,fontWeight:800,color:"#c4b5fd",background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.25)",borderRadius:8,padding:"5px 12px",cursor:"text",userSelect:"none"}}>{disp}</div>
        )}
      </div>
      <input type="range" min={min} max={max} step={s||1} value={value} onChange={e=>setValue(Number(e.target.value))}/>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,opacity:0.25,marginTop:4}}>
        <span>{prefix?`${prefix}${min.toLocaleString()}`:min}</span><span>{prefix?`${prefix}${max.toLocaleString()}`:max}</span>
      </div>
    </div>
  );
}

function App(){
  const[step,setStep]=useState(0);
  const[txC,setTxC]=useState(20);
  const[avg,setAvg]=useState(2000);
  const[cur,setCur]=useState(3);
  const[crd,setCrd]=useState(2);
  const[hasCr,setHasCr]=useState(false);
  const[em,setEm]=useState("");
  const[tg,setTg]=useState("");

  const all=Object.entries(P).map(([k,p])=>({key:k,...p,...cd(p,txC,avg,cur,crd,hasCr)})).sort((a,b)=>a.total-b.total);
  const xbo=all.find(r=>r.key==="xbo");
  const bank=all.find(r=>r.key==="bank");
  const cheap=all[0];
  const mx=Math.max(...all.map(r=>r.total),1);
  const annSave=(bank.total-xbo.total)*12;
  const moSave=bank.total-xbo.total;

  const sb=[
    {label:"Lower FX conversion fees",value:(bank.fxCost-xbo.fxCost)*12},
    {label:"No per-transfer fees",value:(bank.txCost-xbo.txCost)*12},
    {label:"No monthly account fee",value:bank.monthlyFee*12},
    {label:"Free team cards",value:(bank.cardCost-xbo.cardCost)*12},
  ];
  if(hasCr)sb.push({label:"Built-in crypto-to-fiat (no extra fees)",value:bank.cryptoCost*12});

  return(
    <div style={{background:"linear-gradient(180deg,#0a0618 0%,#0f0a1f 30%,#0f0a1f 100%)",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"rgba(15,10,31,0.85)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(139,92,246,0.15)",padding:"12px 28px",position:"sticky",top:0,zIndex:20}}>
        <div style={{maxWidth:800,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#fff"}}>X</div>
            <div>
              <div style={{fontSize:14,fontWeight:800,letterSpacing:-0.3}}>XBO<span style={{color:"#a78bfa"}}>.emoney</span></div>
              <div style={{fontSize:9,opacity:0.4,letterSpacing:0.5}}>FEE SAVINGS CALCULATOR</div>
            </div>
          </div>
          {step>0&&<button onClick={()=>setStep(0)} style={{fontSize:11,fontWeight:600,color:"#a78bfa",background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:8,padding:"6px 14px",cursor:"pointer"}}>Edit inputs</button>}
        </div>
      </div>

      <div style={{maxWidth:800,margin:"0 auto",padding:"0 28px 60px"}}>

        {/* STEP 0 */}
        {step===0&&(
          <div>
            <div style={{textAlign:"center",padding:"48px 0 16px"}}>
              <div style={{display:"inline-block",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:20,padding:"4px 16px",fontSize:11,fontWeight:700,color:"#22c55e",marginBottom:16,letterSpacing:0.5}}>FREE TOOL / 30 SECONDS</div>
              <h1 style={{fontSize:34,fontWeight:900,lineHeight:1.15,letterSpacing:-0.5,margin:"0 0 12px"}}>
                How much are you<br/><span style={{background:"linear-gradient(90deg,#6366f1,#ec4899)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>overpaying</span> for business banking?
              </h1>
              <p style={{fontSize:15,opacity:0.5,maxWidth:480,margin:"0 auto 32px"}}>Compare your costs against XBO.emoney, Revolut, Wise, Airwallex, and traditional banks.</p>
            </div>

            <div style={{background:"linear-gradient(135deg,rgba(99,102,241,0.08),rgba(139,92,246,0.08))",border:"1px solid rgba(99,102,241,0.2)",borderRadius:16,padding:"24px 28px",marginBottom:32}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"#fff"}}>X</div>
                <div><div style={{fontSize:16,fontWeight:800}}>XBO.emoney</div><div style={{fontSize:11,opacity:0.4}}>EU-Regulated Business Banking, Crypto-Native</div></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {["30+ currency IBANs (EUR, GBP, USD and more)","Mastercard business cards for your team","Instant crypto-to-fiat conversion","Bulk payments via SEPA, SWIFT, Faster Payments","Spending limits and team card controls","EU regulated. Live and operational now."].map((f,i)=>(
                  <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",fontSize:12,opacity:0.75}}>
                    <span style={{color:"#22c55e",flexShrink:0,marginTop:1}}>&#10003;</span>{f}
                  </div>
                ))}
              </div>
            </div>

            <div style={{background:"rgba(99,102,241,0.04)",border:"1px solid rgba(99,102,241,0.15)",borderRadius:20,padding:"32px 28px",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
              <h2 style={{fontSize:18,fontWeight:700,margin:"0 0 4px"}}>Your business details</h2>
              <p style={{fontSize:12,opacity:0.4,margin:"0 0 28px"}}>Drag the sliders or click the numbers to type directly.</p>

              <Sld icon={"\u{1F4E4}"} label="International payments per month" value={txC} setValue={setTxC} min={1} max={200}/>
              <Sld icon={"\u{1F4B6}"} label="Average payment size" value={avg} setValue={setAvg} min={100} max={100000} step={100} prefix="€"/>
              <Sld icon={"\u{1F30D}"} label="Currencies you regularly use" value={cur} setValue={setCur} min={1} max={20}/>
              <Sld icon={"\u{1F4B3}"} label="Team cards needed" value={crd} setValue={setCrd} min={0} max={30}/>

              <div style={{display:"flex",alignItems:"center",gap:14,padding:"18px 20px",background:hasCr?"rgba(139,92,246,0.1)":"rgba(99,102,241,0.04)",border:`1px solid ${hasCr?"rgba(139,92,246,0.3)":"rgba(99,102,241,0.1)"}`,borderRadius:14,marginBottom:32,cursor:"pointer",transition:"all 0.2s"}} onClick={()=>setHasCr(!hasCr)}>
                <div style={{width:48,height:26,borderRadius:13,background:hasCr?"linear-gradient(90deg,#6366f1,#8b5cf6)":"rgba(99,102,241,0.15)",transition:"0.25s",position:"relative",flexShrink:0}}>
                  <div style={{width:20,height:20,borderRadius:10,background:"#fff",position:"absolute",top:3,left:hasCr?25:3,transition:"0.25s",boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}/>
                </div>
                <div><div style={{fontSize:13,fontWeight:600}}>I convert crypto to fiat for business payments</div><div style={{fontSize:11,opacity:0.35}}>XBO.emoney has built-in conversion. Others charge extra or don't support it.</div></div>
              </div>

              <div style={{background:"rgba(0,0,0,0.25)",borderRadius:14,padding:"20px 24px",marginBottom:24}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
                  <div><div style={{fontSize:11,opacity:0.4,marginBottom:2}}>Your monthly volume</div><div style={{fontSize:22,fontWeight:800}}>{"\u20AC"}{(txC*avg).toLocaleString()}</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:11,opacity:0.4,marginBottom:2}}>XBO.emoney saves you vs banks</div><div style={{fontSize:22,fontWeight:800,color:"#22c55e"}}>{"\u20AC"}{moSave.toLocaleString()}<span style={{fontSize:13,opacity:0.5}}>/mo</span></div></div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  {all.map(r=>{
                    const w=Math.max((r.total/mx)*100,5);const isX=r.key==="xbo";
                    return(<div key={r.key} style={{flex:1,textAlign:"center"}}><div style={{height:60,display:"flex",alignItems:"flex-end",justifyContent:"center",marginBottom:4}}><div style={{width:"80%",height:`${w}%`,minHeight:6,background:isX?"linear-gradient(180deg,#6366f1,#8b5cf6)":`${r.color}55`,borderRadius:"4px 4px 0 0",transition:"height 0.4s"}}/></div><div style={{fontSize:10,fontWeight:700,opacity:isX?1:0.5,color:isX?"#a78bfa":undefined}}>{r.name.split(" ")[0]}</div><div style={{fontSize:11,fontWeight:800,color:isX?"#22c55e":undefined,opacity:isX?1:0.5}}>{"\u20AC"}{r.total}</div></div>);
                  })}
                </div>
                <div style={{textAlign:"center",fontSize:10,opacity:0.3,marginTop:10}}>Estimated monthly fees by provider (lower is better)</div>
              </div>

              <button onClick={()=>setStep(1)} style={{width:"100%",padding:"18px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(99,102,241,0.4)"}}>See full savings breakdown</button>
            </div>
          </div>
        )}

        {/* STEP 1 */}
        {step===1&&(
          <div style={{paddingTop:32}}>
            <div style={{textAlign:"center",marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,opacity:0.4,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Estimated annual savings vs traditional banks</div>
              <div style={{fontSize:60,fontWeight:900,color:"#22c55e",lineHeight:1,letterSpacing:-2}}>{"\u20AC"}{annSave.toLocaleString()}</div>
              <div style={{fontSize:14,opacity:0.4,marginTop:6}}>That's {"\u20AC"}{moSave.toLocaleString()} every month back in your pocket</div>
            </div>

            <div style={{background:"rgba(34,197,94,0.05)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:16,padding:"24px 28px",marginBottom:24,marginTop:28}}>
              <h3 style={{fontSize:15,fontWeight:700,color:"#86efac",margin:"0 0 16px"}}>Where those savings come from</h3>
              {sb.filter(s=>s.value>0).map((s,i,arr)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<arr.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,fontSize:13}}><span style={{color:"#22c55e"}}>&#10003;</span>{s.label}</div>
                  <div style={{fontSize:15,fontWeight:800,color:"#22c55e"}}>{"\u20AC"}{s.value.toLocaleString()}<span style={{fontSize:10,opacity:0.5}}>/yr</span></div>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:12,paddingTop:12,borderTop:"1px solid rgba(34,197,94,0.2)"}}>
                <span style={{fontSize:14,fontWeight:800}}>Total annual savings</span>
                <span style={{fontSize:18,fontWeight:900,color:"#22c55e"}}>{"\u20AC"}{annSave.toLocaleString()}</span>
              </div>
            </div>

            <div style={{position:"relative",marginBottom:28}}>
              <div style={{filter:"blur(6px)",opacity:0.3,pointerEvents:"none"}}>
                {all.map(r=>(<div key={r.key} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"rgba(99,102,241,0.05)",borderRadius:10,marginBottom:8}}><span style={{fontSize:16}}>{r.icon}</span><span style={{fontSize:13,fontWeight:600,flex:1}}>{r.name}</span><span style={{fontSize:14,fontWeight:800}}>{"\u20AC"}{r.total}/mo</span></div>))}
              </div>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{background:"rgba(15,10,31,0.9)",backdropFilter:"blur(4px)",borderRadius:12,padding:"12px 24px",fontSize:13,fontWeight:700,color:"#a78bfa",border:"1px solid rgba(99,102,241,0.3)"}}>Enter email to unlock full comparison</div>
              </div>
            </div>

            <div style={{background:"rgba(99,102,241,0.06)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:16,padding:28,boxShadow:"0 4px 30px rgba(0,0,0,0.2)"}}>
              <h3 style={{fontSize:16,fontWeight:700,margin:"0 0 4px"}}>Unlock full provider comparison</h3>
              <p style={{fontSize:12,opacity:0.4,margin:"0 0 20px"}}>See the detailed cost breakdown across all 5 providers.</p>
              <div style={{marginBottom:14}}>
                <label style={{fontSize:11,fontWeight:700,marginBottom:6,display:"block",textTransform:"uppercase",letterSpacing:0.5,opacity:0.5}}>Email *</label>
                <input type="email" value={em} onChange={e=>setEm(e.target.value)} placeholder="you@company.com" style={{width:"100%",padding:"14px 18px",background:"rgba(0,0,0,0.3)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:12,color:"#e2e0f0",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div style={{marginBottom:24}}>
                <label style={{fontSize:11,fontWeight:700,marginBottom:6,display:"block",textTransform:"uppercase",letterSpacing:0.5,opacity:0.5}}>Telegram ID <span style={{opacity:0.4}}>(optional)</span></label>
                <input type="text" value={tg} onChange={e=>setTg(e.target.value)} placeholder="@yourtelegram" style={{width:"100%",padding:"14px 18px",background:"rgba(0,0,0,0.3)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:12,color:"#e2e0f0",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
              </div>
              <button onClick={()=>{if(em.includes("@"))setStep(2)}} disabled={!em.includes("@")} style={{width:"100%",padding:18,background:em.includes("@")?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(99,102,241,0.15)",color:em.includes("@")?"#fff":"#666",border:"none",borderRadius:14,fontSize:16,fontWeight:700,cursor:em.includes("@")?"pointer":"not-allowed",boxShadow:em.includes("@")?"0 4px 20px rgba(99,102,241,0.4)":"none"}}>Show full comparison</button>
              <p style={{fontSize:10,opacity:0.25,textAlign:"center",marginTop:10}}>We'll only use this to send you your results. No spam.</p>
            </div>
          </div>
        )}

        {/* STEP 2 */}
        {step===2&&(
          <div style={{paddingTop:32}}>
            <div style={{background:"linear-gradient(135deg,rgba(34,197,94,0.08),rgba(34,197,94,0.02))",border:"1px solid rgba(34,197,94,0.2)",borderRadius:20,padding:"32px 28px",textAlign:"center",marginBottom:32}}>
              <div style={{fontSize:11,fontWeight:700,opacity:0.4,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Your estimated annual savings with XBO.emoney</div>
              <div style={{fontSize:64,fontWeight:900,color:"#22c55e",lineHeight:1,letterSpacing:-2}}>{"\u20AC"}{annSave.toLocaleString()}</div>
              <div style={{fontSize:14,opacity:0.5,marginTop:8}}>{"\u20AC"}{moSave.toLocaleString()}/month saved vs traditional banks</div>
              <div style={{marginTop:24,textAlign:"left",maxWidth:500,margin:"24px auto 0"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#86efac",marginBottom:12}}>Savings breakdown</div>
                {sb.filter(s=>s.value>0).map((s,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:13}}>
                    <span style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"#22c55e"}}>&#10003;</span>{s.label}</span>
                    <span style={{fontWeight:800,color:"#22c55e"}}>{"\u20AC"}{s.value.toLocaleString()}/yr</span>
                  </div>
                ))}
              </div>
            </div>

            <h3 style={{fontSize:18,fontWeight:800,margin:"0 0 18px"}}>Monthly cost by provider</h3>
            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:36}}>
              {all.map(r=>{
                const w=Math.max((r.total/mx)*100,6);const isX=r.key==="xbo";const isC=r.key===cheap.key;
                return(
                  <div key={r.key} style={{background:isX?"rgba(99,102,241,0.08)":"rgba(99,102,241,0.02)",border:`1px solid ${isX?"rgba(99,102,241,0.3)":"rgba(99,102,241,0.08)"}`,borderRadius:14,padding:"16px 20px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:18}}>{r.icon}</span>
                        <div>
                          <span style={{fontSize:14,fontWeight:isX?800:600,color:isX?"#c4b5fd":undefined}}>{r.name}</span>
                          {isC&&<span style={{marginLeft:8,fontSize:10,fontWeight:700,background:"rgba(34,197,94,0.15)",color:"#22c55e",padding:"2px 8px",borderRadius:6}}>LOWEST COST</span>}
                        </div>
                      </div>
                      <span style={{fontSize:20,fontWeight:900,color:isC?"#22c55e":"#e2e0f0"}}>{"\u20AC"}{r.total.toLocaleString()}<span style={{fontSize:12,opacity:0.4,fontWeight:500}}>/mo</span></span>
                    </div>
                    <div style={{width:"100%",height:8,background:"rgba(0,0,0,0.2)",borderRadius:4}}>
                      <div style={{width:`${w}%`,height:"100%",background:isX?"linear-gradient(90deg,#6366f1,#22c55e)":`${r.color}66`,borderRadius:4,transition:"width 0.6s ease"}}/>
                    </div>
                    {isX&&!isC&&<div style={{marginTop:8,fontSize:11,opacity:0.5}}>Only {"\u20AC"}{(r.total-cheap.total).toLocaleString()}/mo more than {cheap.name}, but with built-in crypto-to-fiat and 30+ currencies.</div>}
                  </div>
                );
              })}
            </div>

            <div style={{background:"rgba(245,158,11,0.05)",border:"1px solid rgba(245,158,11,0.15)",borderRadius:14,padding:"18px 22px",marginBottom:24}}>
              <h4 style={{fontSize:12,fontWeight:700,color:"#fbbf24",margin:"0 0 10px",textTransform:"uppercase",letterSpacing:0.5}}>Fee assumptions used</h4>
              <div style={{borderRadius:10,overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead><tr style={{background:"rgba(245,158,11,0.08)"}}>
                    {["Provider","FX Markup","Per Transfer","Monthly Fee","Per Card"].map((h,i)=>(
                      <th key={i} style={{padding:"8px 10px",textAlign:i===0?"left":"right",fontWeight:700,fontSize:10,opacity:0.6}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {Object.entries(P).map(([k,p])=>(
                      <tr key={k} style={{borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                        <td style={{padding:"7px 10px",fontWeight:k==="xbo"?700:400,color:k==="xbo"?"#c4b5fd":undefined}}>{p.icon} {p.name}</td>
                        <td style={{padding:"7px 10px",textAlign:"right",opacity:0.6}}>{(p.fx*100).toFixed(1)}%</td>
                        <td style={{padding:"7px 10px",textAlign:"right",opacity:0.6}}>{"\u20AC"}{p.tx}</td>
                        <td style={{padding:"7px 10px",textAlign:"right",opacity:0.6}}>{"\u20AC"}{p.mo}</td>
                        <td style={{padding:"7px 10px",textAlign:"right",opacity:0.6}}>{"\u20AC"}{p.card}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <p style={{fontSize:10,opacity:0.35,marginTop:8,lineHeight:1.5}}>Airwallex: 0.5% major, 1% minor currencies. Blended 0.7% used. Revolut: 0.6% beyond free FX allowance. Based on public pricing, early 2026.</p>
            </div>

            <h3 style={{fontSize:18,fontWeight:800,margin:"0 0 14px"}}>Full cost breakdown (your numbers)</h3>
            <div style={{borderRadius:14,overflow:"hidden",border:"1px solid rgba(99,102,241,0.2)",marginBottom:32}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"rgba(99,102,241,0.1)"}}>
                  {["Provider","FX Costs","Transfers","Monthly","Cards",hasCr?"Crypto":null,"Total/mo"].filter(Boolean).map((h,i)=>(
                    <th key={i} style={{padding:"12px 14px",textAlign:i===0?"left":"right",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:0.3,opacity:0.6}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {all.map(r=>{
                    const isX=r.key==="xbo";const isC=r.key===cheap.key;
                    return(
                      <tr key={r.key} style={{borderBottom:"1px solid rgba(255,255,255,0.03)",background:isX?"rgba(99,102,241,0.06)":"transparent"}}>
                        <td style={{padding:"12px 14px",fontWeight:isX?800:600,color:isX?"#c4b5fd":undefined}}>{r.icon} {r.name}</td>
                        <td style={{padding:"12px 14px",textAlign:"right",opacity:0.7}}>{"\u20AC"}{r.fxCost.toLocaleString()}</td>
                        <td style={{padding:"12px 14px",textAlign:"right",opacity:0.7}}>{"\u20AC"}{r.txCost.toLocaleString()}</td>
                        <td style={{padding:"12px 14px",textAlign:"right",opacity:0.7}}>{"\u20AC"}{r.monthlyFee}</td>
                        <td style={{padding:"12px 14px",textAlign:"right",opacity:0.7}}>{"\u20AC"}{r.cardCost}</td>
                        {hasCr&&<td style={{padding:"12px 14px",textAlign:"right",opacity:0.7}}>{"\u20AC"}{r.cryptoCost}</td>}
                        <td style={{padding:"12px 14px",textAlign:"right",fontWeight:900,fontSize:14,color:isC?"#22c55e":"#e2e0f0"}}>{"\u20AC"}{r.total.toLocaleString()}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div style={{background:"rgba(99,102,241,0.04)",border:"1px solid rgba(99,102,241,0.12)",borderRadius:14,padding:"18px 22px",marginBottom:32}}>
              <h4 style={{fontSize:12,fontWeight:700,margin:"0 0 12px",opacity:0.4,textTransform:"uppercase",letterSpacing:0.5}}>Calculated based on</h4>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                {[{l:"Payments/month",v:txC},{l:"Avg. payment size",v:`\u20AC${avg.toLocaleString()}`},{l:"Currencies used",v:cur},{l:"Team cards",v:crd},{l:"Crypto to fiat",v:hasCr?"Yes":"No"},{l:"Monthly volume",v:`\u20AC${(txC*avg).toLocaleString()}`}].map((item,i)=>(
                  <div key={i}><div style={{fontSize:10,opacity:0.35}}>{item.l}</div><div style={{fontSize:14,fontWeight:700}}>{item.v}</div></div>
                ))}
              </div>
            </div>

            <div style={{background:"linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.12))",border:"1px solid rgba(99,102,241,0.3)",borderRadius:20,padding:"36px 28px",textAlign:"center"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:16}}>
                <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"#fff"}}>X</div>
                <div style={{fontSize:20,fontWeight:900}}>XBO<span style={{color:"#a78bfa"}}>.emoney</span></div>
              </div>
              <h3 style={{fontSize:22,fontWeight:800,margin:"0 0 8px"}}>Save {"\u20AC"}{annSave.toLocaleString()} this year</h3>
              <p style={{fontSize:13,opacity:0.5,margin:"0 0 24px",maxWidth:420,marginLeft:"auto",marginRight:"auto"}}>30+ currency IBANs. Mastercard cards. Instant crypto-to-fiat. EU regulated. Already live.</p>
              <a href="https://xbo.com/en/emoney" target="_blank" rel="noopener noreferrer" style={{display:"inline-block",padding:"16px 48px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",borderRadius:14,fontSize:16,fontWeight:700,textDecoration:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(99,102,241,0.4)"}}>Request Access Now</a>
              <p style={{fontSize:11,opacity:0.3,marginTop:12}}>Takes 2 minutes. No commitment.</p>
            </div>

            <p style={{fontSize:9,opacity:0.2,textAlign:"center",lineHeight:1.6,marginTop:24}}>Estimates based on publicly available fee structures and industry averages (early 2026). Actual costs vary by plan, volume, and provider. XBO.emoney fees reflect standard tier. For illustrative purposes only, not financial advice.</p>
          </div>
        )}
      </div>

      <div style={{borderTop:"1px solid rgba(99,102,241,0.08)",padding:"20px 28px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:0.3,fontSize:11}}>
          <div style={{width:18,height:18,borderRadius:4,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:900,color:"#fff"}}>X</div>
          <span>Powered by XBO.com</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
