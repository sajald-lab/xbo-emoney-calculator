<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XBO.emoney Fee Savings Calculator</title>
<meta name="description" content="See how much you could save on business banking with XBO.emoney. Compare fees against Revolut, Wise, Airwallex, and traditional banks.">
<meta property="og:title" content="XBO.emoney Fee Savings Calculator">
<meta property="og:description" content="How much are you overpaying for business banking? Compare XBO.emoney vs Revolut, Wise, Airwallex, and traditional banks.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#0f0a1f;color:#e2e0f0;min-height:100vh;-webkit-font-smoothing:antialiased}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(99,102,241,0.15);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);cursor:pointer;box-shadow:0 2px 8px rgba(99,102,241,0.4)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);cursor:pointer;border:none}
::selection{background:rgba(99,102,241,0.3)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef} = React;

// Accurate fee data based on published pricing (early 2026)
// Revolut: Grow plan (most common SME plan)
// Wise: standard business (no monthly, pay per use)
// Airwallex: Explore plan
// Bank: composite NatWest/Santander/HSBC averages
const P = {
  xbo:      {name:"XBO.emoney",       fx:0.003, txLocal:0, txIntl:0, mo:0, card:0, cryptoFx:0, recvFee:0, weekendFx:0, color:"#8b5cf6",icon:"\u{1F7E3}", hasCrypto:true,  note:"Crypto + fiat unified. SEPA/SWIFT."},
  revolut:  {name:"Revolut Business",  fx:0.006, txLocal:0, txIntl:5, mo:35, card:0, cryptoFx:0.025, recvFee:0, weekendFx:0.01, color:"#0075EB",icon:"\u{1F535}", hasCrypto:false, note:"Grow plan. 0.6% FX beyond \u20AC17.5K/mo allowance."},
  wise:     {name:"Wise Business",     fx:0.004, txLocal:0, txIntl:1.5, mo:0, card:3, cryptoFx:0, recvFee:0, weekendFx:0, color:"#9FE870",icon:"\u{1F7E2}", hasCrypto:false, note:"No monthly fee. ~0.4% avg conversion. \u20AC50 setup."},
  airwallex:{name:"Airwallex",         fx:0.006, txLocal:0, txIntl:0, mo:22, card:0, cryptoFx:0, recvFee:0.003, weekendFx:0, color:"#FF6B35",icon:"\u{1F7E0}", hasCrypto:false, note:"Explore plan. 0.5% major, 1% minor FX. 0.3% recv fee."},
  bank:     {name:"Traditional Bank",  fx:0.03,  txLocal:0.5, txIntl:20, mo:40, card:8, cryptoFx:0, recvFee:0, weekendFx:0, color:"#64748b",icon:"\u{1F3E6}", hasCrypto:false, note:"UK high-street avg. 2.5-4% FX markup."},
};

function cd(p,intlTx,localTx,avg,cur,cards,cryptoVol){
  const fxMult=Math.min(cur/3,1.5);
  const fxCost=Math.round(intlTx*avg*p.fx*fxMult);
  const intlTxCost=Math.round(intlTx*p.txIntl);
  const localTxCost=Math.round(localTx*p.txLocal);
  const mo=p.mo;
  const cardCost=cards*p.card;
  // Crypto conversion: if they convert crypto, XBO does it natively at 0% extra. Others need an external exchange (est 1.5-2.5% total cost via exchange+withdrawal)
  const cryptoCost=cryptoVol>0&&!p.hasCrypto?Math.round(cryptoVol*0.02):cryptoVol>0&&p.hasCrypto?Math.round(cryptoVol*p.cryptoFx):0;
  // Receiving fee (Airwallex charges 0.3% on third-party inbound)
  const recvCost=Math.round(intlTx*avg*p.recvFee*0.5); // assume 50% of payments are from third parties
  // Weekend FX surcharge (Revolut charges 1% on weekends, estimate 15% of txns happen on weekends)
  const weekendCost=Math.round(intlTx*avg*p.weekendFx*0.15);
  const total=fxCost+intlTxCost+localTxCost+mo+cardCost+cryptoCost+recvCost+weekendCost;
  return{fxCost,intlTxCost,localTxCost,mo,cardCost,cryptoCost,recvCost,weekendCost,total};
}

function Sld({label,value,setValue,min,max,step:s,prefix,icon,sub}){
  const[ed,setEd]=useState(false);
  const[dr,setDr]=useState("");
  const ref=useRef(null);
  const disp=prefix?`${prefix}${value.toLocaleString()}`:String(value);
  const startE=()=>{setDr(String(value));setEd(true);setTimeout(()=>ref.current?.select(),10)};
  const commit=()=>{const n=parseInt(dr.replace(/[^0-9]/g,""),10);if(!isNaN(n))setValue(Math.max(min,Math.min(max,n)));setEd(false)};
  const onK=(e)=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false)};
  return(
    <div style={{marginBottom:22}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div><span style={{fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>{icon}</span>{label}</span>
        {sub&&<div style={{fontSize:10,opacity:0.3,marginLeft:24,marginTop:2}}>{sub}</div>}</div>
        {ed?(<input ref={ref} type="text" inputMode="numeric" value={dr} onChange={e=>setDr(e.target.value)} onBlur={commit} onKeyDown={onK} style={{width:110,textAlign:"right",fontSize:16,fontWeight:800,color:"#fff",background:"rgba(99,102,241,0.2)",border:"2px solid #8b5cf6",borderRadius:8,padding:"4px 10px",outline:"none",fontFamily:"inherit"}}/>
        ):(<div onClick={startE} style={{minWidth:90,textAlign:"right",fontSize:16,fontWeight:800,color:"#c4b5fd",background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.25)",borderRadius:8,padding:"5px 12px",cursor:"text",userSelect:"none"}}>{disp}</div>)}
      </div>
      <input type="range" min={min} max={max} step={s||1} value={value} onChange={e=>setValue(Number(e.target.value))}/>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,opacity:0.2,marginTop:3}}>
        <span>{prefix?`${prefix}${min.toLocaleString()}`:min}</span><span>{prefix?`${prefix}${max.toLocaleString()}`:max}</span>
      </div>
    </div>
  );
}

function App(){
  const[step,setStep]=useState(0);
  const[intlTx,setIntlTx]=useState(15);
  const[localTx,setLocalTx]=useState(30);
  const[avg,setAvg]=useState(3000);
  const[cur,setCur]=useState(4);
  const[crd,setCrd]=useState(3);
  const[cryptoVol,setCryptoVol]=useState(0);
  const[em,setEm]=useState("");
  const[tg,setTg]=useState("");

  const all=Object.entries(P).map(([k,p])=>({key:k,...p,...cd(p,intlTx,localTx,avg,cur,crd,cryptoVol)})).sort((a,b)=>a.total-b.total);
  const xbo=all.find(r=>r.key==="xbo");
  const bank=all.find(r=>r.key==="bank");
  const cheap=all[0];
  const mx=Math.max(...all.map(r=>r.total),1);
  const annSave=(bank.total-xbo.total)*12;
  const moSave=bank.total-xbo.total;

  const sb=[
    {label:"Lower FX conversion rates",value:(bank.fxCost-xbo.fxCost)*12},
    {label:"No per-transfer fees",value:((bank.intlTxCost+bank.localTxCost)-(xbo.intlTxCost+xbo.localTxCost))*12},
    {label:"No monthly account fee",value:bank.mo*12},
    {label:"Free team cards",value:(bank.cardCost-xbo.cardCost)*12},
  ];
  if(cryptoVol>0)sb.push({label:"Built-in crypto-to-fiat (no exchange fees)",value:(bank.cryptoCost-xbo.cryptoCost)*12});

  const hasCrypto=cryptoVol>0;

  return(
    <div style={{background:"linear-gradient(180deg,#0a0618 0%,#0f0a1f 30%,#0f0a1f 100%)",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"rgba(15,10,31,0.85)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(139,92,246,0.15)",padding:"12px 28px",position:"sticky",top:0,zIndex:20}}>
        <div style={{maxWidth:800,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#fff"}}>X</div>
            <div><div style={{fontSize:14,fontWeight:800,letterSpacing:-0.3}}>XBO<span style={{color:"#a78bfa"}}>.emoney</span></div><div style={{fontSize:9,opacity:0.4,letterSpacing:0.5}}>FEE SAVINGS CALCULATOR</div></div>
          </div>
          {step>0&&<button onClick={()=>setStep(0)} style={{fontSize:11,fontWeight:600,color:"#a78bfa",background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:8,padding:"6px 14px",cursor:"pointer"}}>Edit inputs</button>}
        </div>
      </div>

      <div style={{maxWidth:800,margin:"0 auto",padding:"0 28px 60px"}}>

        {/* STEP 0: INPUTS */}
        {step===0&&(
          <div>
            <div style={{textAlign:"center",padding:"44px 0 16px"}}>
              <div style={{display:"inline-block",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:20,padding:"4px 16px",fontSize:11,fontWeight:700,color:"#22c55e",marginBottom:16,letterSpacing:0.5}}>FREE TOOL</div>
              <h1 style={{fontSize:32,fontWeight:900,lineHeight:1.15,letterSpacing:-0.5,margin:"0 0 12px"}}>How much are you<br/><span style={{background:"linear-gradient(90deg,#6366f1,#ec4899)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>overpaying</span> for business banking?</h1>
              <p style={{fontSize:14,opacity:0.5,maxWidth:460,margin:"0 auto 28px"}}>Compare XBO.emoney against Revolut Business, Wise, Airwallex, and traditional banks with your real numbers.</p>
            </div>

            {/* About XBO.emoney */}
            <div style={{background:"linear-gradient(135deg,rgba(99,102,241,0.08),rgba(139,92,246,0.08))",border:"1px solid rgba(99,102,241,0.2)",borderRadius:16,padding:"22px 26px",marginBottom:28}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,color:"#fff"}}>X</div>
                <div><div style={{fontSize:15,fontWeight:800}}>XBO.emoney</div><div style={{fontSize:11,opacity:0.4}}>EU-Regulated. Crypto + Fiat. One Platform.</div></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {["30+ currency IBANs via SEPA, SWIFT, Faster Payments","Mastercard business cards with team controls","Instant crypto-to-fiat conversion (built in, not bolted on)","Bulk payments, payroll, and supplier payouts","The only platform where your crypto and fiat live together","EU regulated. Live and operational now."].map((f,i)=>(
                  <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",fontSize:12,opacity:0.75}}><span style={{color:i===2||i===4?"#a78bfa":"#22c55e",flexShrink:0,marginTop:1}}>&#10003;</span>{f}</div>
                ))}
              </div>
            </div>

            {/* Calculator */}
            <div style={{background:"rgba(99,102,241,0.04)",border:"1px solid rgba(99,102,241,0.15)",borderRadius:20,padding:"28px 26px",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
              <h2 style={{fontSize:17,fontWeight:700,margin:"0 0 4px"}}>Your business details</h2>
              <p style={{fontSize:11,opacity:0.35,margin:"0 0 24px"}}>Drag sliders or click numbers to type directly.</p>

              <Sld icon={"\u{1F30D}"} label="International payments per month" value={intlTx} setValue={setIntlTx} min={1} max={200} sub="Cross-border transfers to suppliers, contractors, etc."/>
              <Sld icon={"\u{1F3E0}"} label="Local/domestic payments per month" value={localTx} setValue={setLocalTx} min={0} max={500} sub="Same-country transfers (SEPA, Faster Payments, etc.)"/>
              <Sld icon={"\u{1F4B6}"} label="Average payment size" value={avg} setValue={setAvg} min={100} max={100000} step={100} prefix={"\u20AC"}/>
              <Sld icon={"\u{1F30E}"} label="Currencies you regularly use" value={cur} setValue={setCur} min={1} max={20}/>
              <Sld icon={"\u{1F4B3}"} label="Team cards needed" value={crd} setValue={setCrd} min={0} max={30}/>

              {/* Crypto section - highlighted */}
              <div style={{background:"linear-gradient(135deg,rgba(139,92,246,0.08),rgba(99,102,241,0.04))",border:"1px solid rgba(139,92,246,0.2)",borderRadius:16,padding:"20px 22px",marginBottom:24}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <span style={{fontSize:16}}>{"\u{1F504}"}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:"#c4b5fd"}}>Crypto-to-Fiat Conversion</div>
                    <div style={{fontSize:11,opacity:0.35}}>Only XBO.emoney offers this natively. Others require a separate crypto exchange.</div>
                  </div>
                </div>
                <Sld icon={"\u{20BF}"} label="Monthly crypto-to-fiat volume" value={cryptoVol} setValue={setCryptoVol} min={0} max={500000} step={500} prefix={"\u20AC"} sub="How much crypto do you convert to fiat for business use?"/>
                {cryptoVol>0&&(
                  <div style={{background:"rgba(139,92,246,0.1)",borderRadius:10,padding:"12px 16px",fontSize:12,lineHeight:1.7,color:"#c4b5fd"}}>
                    <strong>With other providers:</strong> you'd withdraw crypto to an exchange, sell, wait for settlement, then transfer fiat to your business account. Typical cost: ~2% in exchange fees + withdrawal fees + time delays.<br/>
                    <strong>With XBO.emoney:</strong> convert and spend from the same dashboard. Instant. One platform.
                  </div>
                )}
              </div>

              {/* Live Preview */}
              <div style={{background:"rgba(0,0,0,0.25)",borderRadius:14,padding:"18px 22px",marginBottom:22}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                  <div><div style={{fontSize:10,opacity:0.4,marginBottom:2}}>Your monthly volume</div><div style={{fontSize:20,fontWeight:800}}>{"\u20AC"}{(intlTx*avg+localTx*avg*0.3+cryptoVol).toLocaleString()}</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:10,opacity:0.4,marginBottom:2}}>XBO.emoney saves you vs banks</div><div style={{fontSize:20,fontWeight:800,color:"#22c55e"}}>{"\u20AC"}{moSave.toLocaleString()}<span style={{fontSize:12,opacity:0.5}}>/mo</span></div></div>
                </div>
                <div style={{display:"flex",gap:5}}>
                  {all.map(r=>{const w=Math.max((r.total/mx)*100,5);const isX=r.key==="xbo";
                    return(<div key={r.key} style={{flex:1,textAlign:"center"}}><div style={{height:55,display:"flex",alignItems:"flex-end",justifyContent:"center",marginBottom:3}}><div style={{width:"80%",height:`${w}%`,minHeight:5,background:isX?"linear-gradient(180deg,#6366f1,#8b5cf6)":`${r.color}55`,borderRadius:"3px 3px 0 0",transition:"height 0.4s"}}/></div><div style={{fontSize:9,fontWeight:700,opacity:isX?1:0.5,color:isX?"#a78bfa":undefined}}>{r.name.split(" ")[0]}</div><div style={{fontSize:10,fontWeight:800,color:isX?"#22c55e":undefined,opacity:isX?1:0.4}}>{"\u20AC"}{r.total}</div></div>);
                  })}
                </div>
                <div style={{textAlign:"center",fontSize:9,opacity:0.25,marginTop:8}}>Estimated monthly fees by provider (lower is better)</div>
              </div>

              <button onClick={()=>setStep(1)} style={{width:"100%",padding:"16px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(99,102,241,0.4)"}}>See full savings breakdown</button>
            </div>
          </div>
        )}

        {/* STEP 1: LEAD CAPTURE */}
        {step===1&&(
          <div style={{paddingTop:32}}>
            <div style={{textAlign:"center",marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,opacity:0.4,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Estimated annual savings vs traditional banks</div>
              <div style={{fontSize:56,fontWeight:900,color:"#22c55e",lineHeight:1,letterSpacing:-2}}>{"\u20AC"}{annSave.toLocaleString()}</div>
              <div style={{fontSize:14,opacity:0.4,marginTop:6}}>{"\u20AC"}{moSave.toLocaleString()} every month back in your pocket</div>
            </div>

            {/* Savings breakdown */}
            <div style={{background:"rgba(34,197,94,0.05)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:16,padding:"22px 26px",marginBottom:22,marginTop:24}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#86efac",margin:"0 0 14px"}}>Where those savings come from</h3>
              {sb.filter(s=>s.value>0).map((s,i,arr)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<arr.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,fontSize:13}}><span style={{color:"#22c55e"}}>&#10003;</span>{s.label}</div>
                  <div style={{fontSize:14,fontWeight:800,color:"#22c55e"}}>{"\u20AC"}{s.value.toLocaleString()}<span style={{fontSize:10,opacity:0.5}}>/yr</span></div>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:10,borderTop:"1px solid rgba(34,197,94,0.2)"}}>
                <span style={{fontSize:14,fontWeight:800}}>Total annual savings</span>
                <span style={{fontSize:18,fontWeight:900,color:"#22c55e"}}>{"\u20AC"}{annSave.toLocaleString()}</span>
              </div>
            </div>

            {/* Crypto callout */}
            {hasCrypto&&(
              <div style={{background:"rgba(139,92,246,0.06)",border:"1px solid rgba(139,92,246,0.2)",borderRadius:14,padding:"18px 22px",marginBottom:22}}>
                <div style={{fontSize:13,fontWeight:700,color:"#c4b5fd",marginBottom:6}}>Only XBO.emoney unifies crypto and fiat</div>
                <div style={{fontSize:12,opacity:0.5,lineHeight:1.7}}>
                  You're converting {"\u20AC"}{cryptoVol.toLocaleString()}/month in crypto. With Revolut, Wise, or Airwallex, you'd need a separate crypto exchange, pay ~2% in fees, and manually transfer the fiat. With XBO.emoney, it's one click from the same dashboard. No extra platform. No extra fees. No delays.
                </div>
              </div>
            )}

            {/* Blurred teaser */}
            <div style={{position:"relative",marginBottom:24}}>
              <div style={{filter:"blur(6px)",opacity:0.3,pointerEvents:"none"}}>
                {all.map(r=>(<div key={r.key} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"rgba(99,102,241,0.05)",borderRadius:10,marginBottom:6}}><span style={{fontSize:14}}>{r.icon}</span><span style={{fontSize:12,fontWeight:600,flex:1}}>{r.name}</span><span style={{fontSize:13,fontWeight:800}}>{"\u20AC"}{r.total}/mo</span></div>))}
              </div>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{background:"rgba(15,10,31,0.9)",borderRadius:12,padding:"12px 24px",fontSize:13,fontWeight:700,color:"#a78bfa",border:"1px solid rgba(99,102,241,0.3)"}}>Enter email to unlock full comparison</div>
              </div>
            </div>

            {/* Lead form */}
            <div style={{background:"rgba(99,102,241,0.06)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:16,padding:26,boxShadow:"0 4px 30px rgba(0,0,0,0.2)"}}>
              <h3 style={{fontSize:16,fontWeight:700,margin:"0 0 4px"}}>Unlock full provider comparison</h3>
              <p style={{fontSize:12,opacity:0.4,margin:"0 0 18px"}}>See detailed costs across all 5 providers, including hidden fees.</p>
              <div style={{marginBottom:14}}>
                <label style={{fontSize:11,fontWeight:700,marginBottom:6,display:"block",textTransform:"uppercase",letterSpacing:0.5,opacity:0.5}}>Email *</label>
                <input type="email" value={em} onChange={e=>setEm(e.target.value)} placeholder="you@company.com" style={{width:"100%",padding:"14px 18px",background:"rgba(0,0,0,0.3)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:12,color:"#e2e0f0",fontSize:14,outline:"none",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor="rgba(99,102,241,0.5)"} onBlur={e=>e.target.style.borderColor="rgba(99,102,241,0.2)"}/>
              </div>
              <div style={{marginBottom:22}}>
                <label style={{fontSize:11,fontWeight:700,marginBottom:6,display:"block",textTransform:"uppercase",letterSpacing:0.5,opacity:0.5}}>Telegram ID <span style={{opacity:0.4}}>(optional)</span></label>
                <input type="text" value={tg} onChange={e=>setTg(e.target.value)} placeholder="@yourtelegram" style={{width:"100%",padding:"14px 18px",background:"rgba(0,0,0,0.3)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:12,color:"#e2e0f0",fontSize:14,outline:"none",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor="rgba(99,102,241,0.5)"} onBlur={e=>e.target.style.borderColor="rgba(99,102,241,0.2)"}/>
              </div>
              <button onClick={()=>{if(em.includes("@")){
                const vol=intlTx*avg+localTx*avg*0.3+cryptoVol;
